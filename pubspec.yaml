name: cleanwalk
description: "CleanWalk – Environmental cleanliness and litter reporting app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.2
  image_picker: ^1.1.2
  file_picker: ^8.0.6

  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1

  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0

  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.4

  tflite_flutter: ^0.12.1
  image: ^4.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/cleanwalk_model.tflite

flutter_icons:
  android: true
  ios: true
  image_path: assets/images/cleanwalk_logo.png